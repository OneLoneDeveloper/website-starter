<!--
  Copy this snippet into any page where you want a modal dialog.

  How to add it to a page:
  1. Paste the open button and the <dialog> markup into the page.
  2. Give the trigger button a data-modal-open value that matches the dialog id.
  3. Add data-modal-close to any button that should close the modal.
  4. Make sure the page loads the modal script, or the shared script in public/js/main.js.
-->

<!-- Modal -->
<button type="button" data-modal-open="example-modal">Open Modal</button>

<dialog class="modal" id="example-modal" aria-labelledby="example-modal-title">
  <div class="modal__panel">
    <header class="modal__header">
      <h2 class="modal__title" id="example-modal-title">Modal Title</h2>

      <button
        class="modal__close"
        type="button"
        data-modal-close
        aria-label="Close modal"
      >
        &times;
      </button>
    </header>

    <div class="modal__body">
      <p>
        This is the modal content. You can put forms, text, images, or anything
        else here.
      </p>
    </div>

    <footer class="modal__footer">
      <button type="button" data-modal-close>Cancel</button>
      <button type="button">Confirm</button>
    </footer>
  </div>
</dialog>
