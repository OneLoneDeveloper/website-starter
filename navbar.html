<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Responsive Navbar Demo</title>
    <link rel="stylesheet" href="public/css/reset.css" />
    <link rel="stylesheet" href="public/css/base.css" />
    <link rel="stylesheet" href="public/css/components/navbar.css" />
    <link rel="stylesheet" href="public/css/components/modal.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Main navigation">
        <a class="navbar__brand" href="#">Brand</a>

        <button
          class="navbar__toggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-controls="main-menu"
          aria-expanded="false"
        >
          <span class="navbar__icon" aria-hidden="true"></span>
        </button>

        <div class="navbar__menu" id="main-menu" data-open="false">
          <ul class="navbar__list">
            <li>
              <a class="navbar__link" href="#" aria-current="page">Home</a>
            </li>
            <li><a class="navbar__link" href="#">About</a></li>
            <li><a class="navbar__link" href="#">Services</a></li>
            <li><a class="navbar__link" href="#">Portfolio</a></li>
            <li><a class="navbar__link" href="#">Contact</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- Modal -->
    <button type="button" data-modal-open="example-modal">Open Modal</button>

    <dialog
      class="modal"
      id="example-modal"
      aria-labelledby="example-modal-title"
    >
      <div class="modal__panel">
        <header class="modal__header">
          <h2 class="modal__title" id="example-modal-title">Modal Title</h2>

          <button
            class="modal__close"
            type="button"
            data-modal-close
            aria-label="Close modal"
          >
            &times;
          </button>
        </header>

        <div class="modal__body">
          <p>
            This is the modal content. You can put forms, text, images, or
            anything else here.
          </p>
        </div>

        <footer class="modal__footer">
          <button type="button" data-modal-close>Cancel</button>
          <button type="button">Confirm</button>
        </footer>
      </div>
    </dialog>

    <script src="public/js/components/navbar.js"></script>
    <script src="public/js/components/modal.js"></script>
  </body>
</html>
